<!-- 背景粒子与导航栏交互 -->
<script>
    (function() {
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        let width, height, particles = [];
        function resize() { width = canvas.width = window.innerWidth; height = canvas.height = window.innerHeight; }
        resize();
        window.addEventListener('resize', resize);
        class Particle {
            constructor() { this.reset(); }
            reset() {
                this.x = Math.random()*width; this.y = Math.random()*height;
                this.vx = (Math.random()-0.5)*0.3; this.vy = (Math.random()-0.5)*0.3;
                this.radius = Math.random()*1.8+0.5; this.alpha = Math.random()*0.35+0.1;
            }
            update() { this.x+=this.vx; this.y+=this.vy; if(this.x<-20)this.x=width+20; if(this.x>width+20)this.x=-20; if(this.y<-20)this.y=height+20; if(this.y>height+20)this.y=-20; }
            draw(ctx) { ctx.beginPath(); ctx.arc(this.x,this.y,this.radius,0,Math.PI*2); ctx.fillStyle=`hsla(190,90%,70%,${this.alpha})`; ctx.fill(); }
        }
        function init() { particles=[]; for(let i=0;i<80;i++) particles.push(new Particle()); }
        init();
        function anim() { ctx.clearRect(0,0,width,height); particles.forEach(p=>{p.update();p.draw(ctx);}); requestAnimationFrame(anim); }
        anim();
    })();
    const navbar = document.getElementById('navbar');
    const navToggle = document.getElementById('navToggle');
    const navLinks = document.getElementById('navLinks');
    window.addEventListener('scroll', () => navbar.classList.toggle('scrolled', window.scrollY > 60));
    navToggle.addEventListener('click', () => navLinks.classList.toggle('active'));
    navLinks.querySelectorAll('a').forEach(link => link.addEventListener('click', () => navLinks.classList.remove('active')));
</script>
